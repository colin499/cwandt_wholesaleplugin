query RunInput {
  cart {
    buyerIdentity {
      countryCode
      customer {
        metafield(namespace: "wholesale", key: "status") {
          value
        }
      }
    }
  }
  deliveryGroups {
    id
    deliveryOptions {
      handle
      title
      cost {
        amount
        currencyCode
      }
    }
  }
}
