query CartDeliveryOptionsTransformRunInput {
  cart {
    buyerIdentity {
      customer {
        metafield(namespace: "wholesale", key: "status") {
          value
        }
      }
    }
    lines {
      merchandise {
        __typename
        ... on ProductVariant {
          product {
            noFreeShipping: hasAnyTag(tags: ["no-free-shipping"])
          }
        }
      }
    }
    deliveryGroups {
      id
      deliveryAddress {
        countryCode
      }
      deliveryOptions {
        handle
        title
        cost {
          amount
        }
      }
    }
  }
}
