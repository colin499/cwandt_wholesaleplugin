# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4146afaca3e98ebf6d9b2a4190c977e5"
name = "CW&T_Wholesale"
application_url = "https://actor-sees-uncle-peripherals.trycloudflare.com"
embedded = true
handle = "cwandt-wholesale"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "cwt-apps.myshopify.com"

[access_scopes]
scopes = "read_customers,write_customers,read_products,write_products,read_orders,write_orders,read_inventory,write_inventory,read_draft_orders,write_draft_orders,read_shipping,write_shipping,read_discounts,write_discounts,read_price_rules,write_price_rules,read_payment_terms,write_payment_terms,read_delivery_customizations,write_delivery_customizations"

[auth]
redirect_urls = [
  "https://actor-sees-uncle-peripherals.trycloudflare.com/auth/callback",
  "https://actor-sees-uncle-peripherals.trycloudflare.com/auth/shopify/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2026-04"

  # All topics declared here (not via the API in afterAuth): relative URIs
  # resolve against application_url, which the CLI rewrites every dev session,
  # so subscriptions survive tunnel changes. API-registered webhooks silently
  # rotted (webhookSubscriptions came back empty on the dev store, 2026-07-11).
  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = [
    "products/create",
    "products/update",
    "inventory_levels/update",
    "app/uninstalled",
    "customers/create",
    "customers/update",
    "orders/create",
    "orders/updated"
  ]

  # GDPR compliance topics (mandatory handlers; also back the data-protection
  # attestations made in the Partner Dashboard)
  [[webhooks.subscriptions]]
  compliance_topics = [
    "customers/data_request",
    "customers/redact",
    "shop/redact"
  ]
  uri = "/webhooks"

[app_proxy]
url = "https://actor-sees-uncle-peripherals.trycloudflare.com/app-proxy"
subpath = "wholesale"
prefix = "apps"

[pos]
embedded = false
