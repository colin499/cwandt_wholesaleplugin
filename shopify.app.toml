# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4146afaca3e98ebf6d9b2a4190c977e5"
name = "CW&T_Wholesale"
application_url = "https://actor-sees-uncle-peripherals.trycloudflare.com"
embedded = true
handle = "cwandt-wholesale"

[build]
automatically_update_urls_on_dev = true
dev_store_url = "cwt-apps.myshopify.com"

[access_scopes]
scopes = "read_customers,write_customers,read_products,write_products,read_orders,write_orders,read_inventory,write_inventory,read_draft_orders,write_draft_orders,read_shipping,write_shipping,read_discounts,write_discounts,read_price_rules,write_price_rules"

[auth]
redirect_urls = [
  "https://actor-sees-uncle-peripherals.trycloudflare.com/auth/callback",
  "https://actor-sees-uncle-peripherals.trycloudflare.com/auth/shopify/callback",
  "http://localhost:3000/auth/callback",
  "http://localhost:3000/auth/shopify/callback"
]

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = [
    "products/create",
    "products/update",
    "inventory_levels/update",
    "app/uninstalled"
  ]

[app_proxy]
url = "https://actor-sees-uncle-peripherals.trycloudflare.com/app-proxy"
subpath = "wholesale"
prefix = "apps"

[pos]
embedded = false
